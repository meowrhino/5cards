<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B3A1B">
  <title>5cards</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>
<body data-game="chinchon">

  <!-- ============================================ -->
  <!-- PANTALLA PRINCIPAL: seleccion de juego        -->
  <!-- ============================================ -->
  <div id="screen-main" class="screen active">

    <!-- menu superior: 5 juegos -->
    <nav id="game-nav">
      <button class="game-tab active" data-game="chinchon">chinchon</button>
      <button class="game-tab" data-game="uno">uno</button>
      <button class="game-tab" data-game="rummikub">rummikub</button>
      <button class="game-tab" data-game="virus">virus</button>
      <button class="game-tab" data-game="poker">poker</button>
    </nav>

    <!-- baraja + info del juego -->
    <div id="deck-showcase">
      <div id="game-info-card"></div>
      <div id="full-deck-display"></div>
    </div>

    <!-- configuracion + jugar -->
    <div id="game-setup">
      <div id="setup-options">
        <div id="player-config">
          <label for="num-players">jugadores:</label>
          <select id="num-players">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>

        <!-- opciones chinchon -->
        <div id="chinchon-options" class="game-options">
          <label>limite: <select id="chinchon-limit">
            <option value="51">51</option>
            <option value="101" selected>101</option>
            <option value="151">151</option>
          </select></label>
        </div>

        <!-- opciones poker -->
        <div id="poker-options" class="game-options" style="display:none;">
          <label>fichas: <input type="number" id="poker-chips" value="1000" min="100" step="100"></label>
          <label>variante: <select id="poker-variant">
            <option value="no-limit" selected>no-limit</option>
            <option value="limit">limit</option>
            <option value="pot-limit">pot-limit</option>
          </select></label>
        </div>

        <!-- opciones virus -->
        <div id="virus-options" class="game-options" style="display:none;"></div>

        <!-- opciones uno -->
        <div id="uno-options" class="game-options" style="display:none;"></div>

        <!-- opciones rummikub -->
        <div id="rummikub-options" class="game-options" style="display:none;">
          <label>minimo: <input type="number" id="rummikub-min" value="30" min="20" max="50" step="5"></label>
        </div>
      </div>

      <button id="btn-play">jugar</button>
    </div>

    <footer id="main-footer">
      <small>meowrhino.studio</small>
    </footer>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA CONTRASEÑAS                          -->
  <!-- ============================================ -->
  <div id="screen-passwords" class="screen">
    <h2>configurar jugadores</h2>
    <div id="password-fields">
      <!-- se genera con JS -->
    </div>
    <button id="btn-start-game">empezar partida</button>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA TURNO: pedir contraseña              -->
  <!-- ============================================ -->
  <div id="screen-turn" class="screen">
    <div id="turn-avatar"></div>
    <h2 id="turn-title">turno de <span id="turn-player-name"></span></h2>
    <input type="password" id="turn-password" placeholder="contraseña" autocomplete="off">
    <button id="btn-unlock">desbloquear</button>
    <p id="turn-error" class="error-msg"></p>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA JUEGO                                -->
  <!-- ============================================ -->
  <div id="screen-game" class="screen">
    <div id="game-header">
      <span id="game-current-player"></span>
      <span id="game-info-display"></span>
      <button id="btn-back" title="volver atras">← atras</button>
    </div>

    <div id="game-table">
      <!-- zona de juego central -->
    </div>

    <div id="hand-toolbar">
      <span id="hand-info"></span>
      <div id="hand-tools">
        <button id="btn-sort-value" class="hand-tool-btn" title="ordenar por valor">↕ valor</button>
        <button id="btn-sort-suit" class="hand-tool-btn" title="ordenar por palo">↕ palo</button>
      </div>
    </div>

    <div id="game-hand">
      <!-- mano del jugador actual -->
    </div>

    <div id="game-actions">
      <!-- botones de accion segun el juego -->
    </div>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA PUNTUACIONES                         -->
  <!-- ============================================ -->
  <div id="screen-scores" class="screen">
    <h2>puntuaciones</h2>
    <table id="scores-table">
      <!-- se genera con JS -->
    </table>
    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
      <button id="btn-next-round" class="btn btn--accent">siguiente ronda</button>
      <button id="btn-end-game" class="btn btn--ghost">terminar</button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- MODAL                                         -->
  <!-- ============================================ -->
  <div id="modal-overlay">
    <div class="modal-content">
      <!-- contenido dinamico -->
    </div>
  </div>

  <!-- ============================================ -->
  <!-- SCRIPTS (orden de dependencias)               -->
  <!-- ============================================ -->

  <!-- libs externas: anime.js para animaciones brutalistas -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <!-- core (sin dependencias entre si) -->
  <script src="js/core/event-bus.js"></script>
  <script src="js/core/suit-equivalence.js"></script>
  <script src="js/core/cards-data.js"></script>
  <script src="js/core/game-engine.js"></script>
  <script src="js/core/screen-manager.js"></script>

  <!-- ui (depende de core) -->
  <script src="js/ui/animations.js"></script>
  <script src="js/ui/card-component.js"></script>
  <script src="js/ui/transform-animator.js"></script>
  <script src="js/ui/modal-manager.js"></script>
  <script src="js/ui/main-screen.js"></script>
  <script src="js/ui/turn-screen.js"></script>
  <script src="js/ui/score-screen.js"></script>

  <!-- games: interface comun -->
  <script src="js/games/game-interface.js"></script>

  <!-- chinchon: rules + scoring + render + orquestador -->
  <script src="js/games/chinchon/chinchon-rules.js"></script>
  <script src="js/games/chinchon/chinchon-scoring.js"></script>
  <script src="js/games/chinchon/chinchon-render.js"></script>
  <script src="js/games/chinchon/chinchon.js"></script>

  <!-- uno -->
  <script src="js/games/uno/uno-rules.js"></script>
  <script src="js/games/uno/uno-scoring.js"></script>
  <script src="js/games/uno/uno-render.js"></script>
  <script src="js/games/uno/uno.js"></script>

  <!-- rummikub -->
  <script src="js/games/rummikub/rummikub-rules.js"></script>
  <script src="js/games/rummikub/rummikub-scoring.js"></script>
  <script src="js/games/rummikub/rummikub-render.js"></script>
  <script src="js/games/rummikub/rummikub.js"></script>

  <!-- virus -->
  <script src="js/games/virus/virus-rules.js"></script>
  <script src="js/games/virus/virus-actions.js"></script>
  <script src="js/games/virus/virus-treatments.js"></script>
  <script src="js/games/virus/virus-render.js"></script>
  <script src="js/games/virus/virus.js"></script>

  <!-- poker -->
  <script src="js/games/poker/poker-evaluator.js"></script>
  <script src="js/games/poker/poker-side-pots.js"></script>
  <script src="js/games/poker/poker-betting.js"></script>
  <script src="js/games/poker/poker-render.js"></script>
  <script src="js/games/poker/poker.js"></script>

  <!-- app (depende de todo) -->
  <script src="js/app.js"></script>
</body>
</html>
