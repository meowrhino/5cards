<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5cards</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body data-game="chinchon">

  <!-- ============================================ -->
  <!-- PANTALLA PRINCIPAL: selección de juego        -->
  <!-- ============================================ -->
  <div id="screen-main" class="screen active">

    <!-- menú superior: 5 juegos -->
    <nav id="game-nav">
      <button class="game-tab active" data-game="chinchon">chinchón</button>
      <button class="game-tab" data-game="uno">uno</button>
      <button class="game-tab" data-game="rummikub">rummikub</button>
      <button class="game-tab" data-game="virus">virus</button>
      <button class="game-tab" data-game="poker">poker</button>
    </nav>

    <!-- zona de cartas: baraja ordenada -->
    <div id="card-display">
      <!-- las cartas se generan con JS -->
    </div>

    <!-- zona inferior: configuración + jugar -->
    <div id="game-setup">
      <div id="setup-options">
        <!-- opciones específicas de cada juego se muestran aquí -->
        <div id="player-config">
          <label for="num-players">jugadores:</label>
          <select id="num-players">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>

        <!-- opciones chinchón -->
        <div id="chinchon-options" class="game-options">
          <label>puntos para perder: <input type="number" id="chinchon-limit" value="100" min="50" max="200" step="10"></label>
        </div>

        <!-- opciones poker -->
        <div id="poker-options" class="game-options" style="display:none;">
          <label>fichas iniciales: <input type="number" id="poker-chips" value="1000" min="100" step="100"></label>
        </div>

        <!-- opciones virus -->
        <div id="virus-options" class="game-options" style="display:none;">
          <!-- virus no necesita config extra -->
        </div>

        <!-- opciones uno -->
        <div id="uno-options" class="game-options" style="display:none;">
          <!-- uno no necesita config extra -->
        </div>

        <!-- opciones rummikub -->
        <div id="rummikub-options" class="game-options" style="display:none;">
          <label>puntos mínimos primera jugada: <input type="number" id="rummikub-min" value="30" min="20" max="50" step="5"></label>
        </div>
      </div>

      <button id="btn-play">jugar</button>
    </div>

    <footer id="main-footer">
      <small>meowrhino.studio</small>
    </footer>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA CONTRASEÑAS: setup de jugadores      -->
  <!-- ============================================ -->
  <div id="screen-passwords" class="screen">
    <h2>configurar jugadores</h2>
    <div id="password-fields">
      <!-- se genera con JS -->
    </div>
    <button id="btn-start-game">empezar partida</button>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA TURNO: pedir contraseña              -->
  <!-- ============================================ -->
  <div id="screen-turn" class="screen">
    <h2 id="turn-title">soy jugador <span id="turn-player-name"></span></h2>
    <input type="password" id="turn-password" placeholder="contraseña">
    <button id="btn-unlock">desbloquear mano</button>
    <p id="turn-error" class="error-msg"></p>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA JUEGO: la partida en sí              -->
  <!-- ============================================ -->
  <div id="screen-game" class="screen">
    <div id="game-header">
      <span id="game-current-player"></span>
      <span id="game-info"></span>
      <button id="btn-back" title="volver atrás (pide contraseña)">← atrás</button>
    </div>

    <div id="game-table">
      <!-- zona de juego central (mesa) -->
    </div>

    <div id="game-hand">
      <!-- mano del jugador actual -->
    </div>

    <div id="game-actions">
      <!-- botones de acción según el juego -->
      <button id="btn-pass-turn">pasar turno</button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- PANTALLA PUNTUACIONES                         -->
  <!-- ============================================ -->
  <div id="screen-scores" class="screen">
    <h2>puntuaciones</h2>
    <table id="scores-table">
      <!-- se genera con JS -->
    </table>
    <button id="btn-next-round">siguiente ronda</button>
    <button id="btn-end-game">terminar partida</button>
  </div>

  <!-- ============================================ -->
  <!-- MODAL: volver atrás pidiendo contraseña       -->
  <!-- ============================================ -->
  <div id="modal-back" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>introduce la contraseña del jugador actual</h3>
      <input type="password" id="back-password" placeholder="contraseña">
      <button id="btn-confirm-back">confirmar</button>
      <button id="btn-cancel-back">cancelar</button>
      <p id="back-error" class="error-msg"></p>
    </div>
  </div>

  <!-- scripts modulares -->
  <script src="js/cards-data.js"></script>
  <script src="js/card-renderer.js"></script>
  <script src="js/game-engine.js"></script>
  <script src="js/chinchon.js"></script>
  <script src="js/uno.js"></script>
  <script src="js/rummikub.js"></script>
  <script src="js/virus.js"></script>
  <script src="js/poker.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
